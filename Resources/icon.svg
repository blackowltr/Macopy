<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="bgGrad" x1="15%" y1="85%" x2="85%" y2="15%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2E0A94"/>
      <stop offset="25%" stop-color="#4C1FC7"/>
      <stop offset="55%" stop-color="#2661EB"/>
      <stop offset="82%" stop-color="#00A6E0"/>
      <stop offset="100%" stop-color="#14D1B8"/>
    </linearGradient>
    
    <!-- Ambient glow top-left -->
    <radialGradient id="glowTL" cx="20%" cy="80%" r="60%" fx="20%" fy="80%">
      <stop offset="0%" stop-color="#9966FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9966FF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Ambient glow bottom-right -->
    <radialGradient id="glowBR" cx="85%" cy="15%" r="55%" fx="85%" fy="15%">
      <stop offset="0%" stop-color="#00E8C8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E8C8" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Clipboard body gradient -->
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#F0F2FA" stop-opacity="0.98"/>
    </linearGradient>
    
    <!-- Clip mechanism gradient -->
    <linearGradient id="clipMechGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D1D3DA"/>
      <stop offset="50%" stop-color="#EBECF0"/>
      <stop offset="100%" stop-color="#C7C9D0"/>
    </linearGradient>
    
    <!-- Clip circle gradient -->
    <linearGradient id="clipCircGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8D9DE"/>
      <stop offset="40%" stop-color="#F2F3F7"/>
      <stop offset="100%" stop-color="#CCCDD4"/>
    </linearGradient>
    
    <!-- Paper gradient -->
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EEF0F5" stop-opacity="0.6"/>
    </linearGradient>
    
    <!-- Glass overlay -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Line colors -->
    <linearGradient id="lineGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34C759" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#30D158" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lineBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#007AFF" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lineRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF453A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FF3B30" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lineOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9F0A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FF9500" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="linePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BF5AF2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#AF52DE" stop-opacity="0.7"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="-12" stdDeviation="40" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    
    <!-- Inner shadow for clipboard -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="8" result="offset-blur"/>
      <feComposite in="SourceGraphic" in2="offset-blur" operator="over"/>
    </filter>
    
    <!-- Checkmark gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#30D158"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded rect -->
  <rect x="40" y="40" width="944" height="944" rx="220" fill="url(#bgGrad)"/>
  
  <!-- Ambient glows -->
  <ellipse cx="-200" cy="1224" rx="350" ry="350" fill="url(#glowTL)"/>
  <ellipse cx="1224" cy="-150" rx="350" ry="350" fill="url(#glowBR)"/>
  
  <!-- Clipboard main body -->
  <g filter="url(#shadow)">
    <rect x="322" y="277" width="380" height="470" rx="40" fill="url(#clipGrad)"/>
  </g>
  
  <!-- Glass overlay on clipboard (top half) -->
  <path d="M322 747 L322 512 L702 512 L702 727 Q702 747 662 747 L362 747 Q322 747 322 727 Z" fill="url(#glassGrad)"/>
  
  <!-- Clip mechanism -->
  <rect x="457" y="745" width="110" height="36" rx="14" fill="url(#clipMechGrad)"/>
  
  <!-- Clip top circle -->
  <circle cx="512" cy="773" r="32" fill="url(#clipCircGrad)"/>
  <circle cx="512" cy="773" r="12" fill="#8C8E98"/>
  
  <!-- Paper on clipboard -->
  <rect x="358" y="313" width="308" height="394" rx="24" fill="url(#paperGrad)"/>
  
  <!-- Text lines on paper -->
  <rect x="388" y="627" width="248" height="9" rx="4.5" fill="url(#lineGreen)"/>
  <rect x="388" y="589" width="197" height="9" rx="4.5" fill="url(#lineBlue)"/>
  <rect x="388" y="551" width="224" height="9" rx="4.5" fill="url(#lineRed)"/>
  <rect x="388" y="513" width="157" height="9" rx="4.5" fill="url(#lineOrange)"/>
  <rect x="388" y="475" width="206" height="9" rx="4.5" fill="url(#linePurple)"/>
  <rect x="388" y="437" width="175" height="9" rx="4.5" fill="url(#lineGreen)"/>
  
  <!-- Checkmark on paper -->
  <path d="M618 333 L600 351 L570 321" fill="none" stroke="url(#checkGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <!-- Subtle highlight on clipboard edge -->
  <path d="M362 747 L330 407" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"/>
</svg>